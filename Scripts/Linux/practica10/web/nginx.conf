# ============================================================
# nginx.conf - Configuración endurecida
# ============================================================

# Corre como webuser (no root)
user webuser webgroup;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------
    # HARDENING: Ocultar firma del servidor (server tokens)
    # -------------------------------------------------------
    # Oculta la versión de Nginx en headers y páginas de error
    server_tokens off;

    # Cabeceras de seguridad adicionales
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Logs
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Gzip para recursos estáticos
    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;

    server {
        # Puerto no-privilegiado (usuario no-root no puede bindear <1024)
        listen       8080 default_server;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html;

        # Ocultar archivos sensibles
        location ~ /\. { deny all; }

        location / {
            try_files $uri $uri/ =404;
        }

        # Caché agresiva para estáticos
        location ~* \.(css|js|png|jpg|jpeg|svg|ico)$ {
            expires 7d;
            add_header Cache-Control "public";
        }

        # Página de error personalizada (no revela versión)
        error_page 500 502 503 504 /index.html;
    }
}
