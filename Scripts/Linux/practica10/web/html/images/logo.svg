  <rect x="50" y="35" width="25" height="8" rx="2" fill="#0f172a" opacity="0.7"/>
  <rect x="20" y="47" width="25" height="8" rx="2" fill="#0f172a" opacity="0.7"/>
  <rect x="50" y="47" width="25" height="8" rx="2" fill="#0f172a" opacity="0.7"/>
  <rect x="20" y="59" width="55" height="8" rx="2" fill="#0f172a" opacity="0.7"/>
  <!-- Círculo superior (servicio) -->
  <circle cx="50" cy="20" r="6" fill="#22c55e"/>
</svg>
